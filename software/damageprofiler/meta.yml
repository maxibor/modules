name: damageprofiler
description: DamageProfiler calculates damage profiles of mapped reads and provides a graphical as well as text based representation.
keywords:
  - bam
  - aDNA
  - damage
  - damage profiling
tools:
  - damageprofiler:
      description: A Java based tool to determine damage patterns on ancient DNA as a replacement for mapDamage
      homepage: https://github.com/Integrative-Transcriptomics/DamageProfiler
      documentation: https://damageprofiler.readthedocs.io
      licence: ['GPL v3']

input:
  - meta:
      type: map
      description: |
        Groovy Map containing sample information
        e.g. [ id:'test', single_end:false ]
  - bam:
      type: file
      description: BAM/CRAM/SAM file
      pattern: "*.{bam,cram,sam}"
output:
  - meta:
      type: map
      description: |
        Groovy Map containing sample information
        e.g. [ id:'test', single_end:false ]
  - version:
      type: file
      description: File containing software version
      pattern: "*.{version.txt}"
  - txt:
      type: file
      description: |
        Tab separated text files, containing the raw data to make the plots
      pattern: "*/*.txt"
  - log:
      type: file
      description: Log file of DamageProfiler
      pattern: "*/DamageProfiler.log"
  - pdf:
      type: file
      description: |
        Damage, edit distance, and read length distribution plots
      pattern: "*/*.pdf"
  - json:
      type: file
      description: |
        JSON file containing the base composition of the reads mapping
        to the sample
      pattern: "*/dmgprof.json"



authors:
  - "@maxibor"
